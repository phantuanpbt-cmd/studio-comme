name: Bao cao san luong KOC -> Lark

on:
  schedule:
    - cron: "0 13 * * *"
    - cron: "30 13 * * 0"
    - cron: "0 1 1 * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Che do bao cao"
        required: true
        default: "daily"
        type: choice
        options: [daily, weekly, monthly]

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve mode
        id: mode
        run: |
          case "${{ github.event.schedule }}" in
            "0 13 * * *")   echo "mode=daily"   >> "$GITHUB_OUTPUT" ;;
            "30 13 * * 0")  echo "mode=weekly"  >> "$GITHUB_OUTPUT" ;;
            "0 1 1 * *")    echo "mode=monthly" >> "$GITHUB_OUTPUT" ;;
            *)              echo "mode=${{ github.event.inputs.mode || 'daily' }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Send report to Lark
        env:
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
        run: node notify/aggregate.js ${{ steps.mode.outputs.mode }}
